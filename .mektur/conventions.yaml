id: CON-006
product: PRD-001
rationale: During SPR-002, test cleanup scripts deleted user data from local.db twice — once deleting today's tasks and once losing Saturday's tasks via a DB file move. Data was unrecoverable.
rule: Never run destructive operations (DELETE, cleanup scripts, DB file moves) against the live database (local.db). Unit tests must use in-memory databases via createTestDb(). If manual curl testing is needed, use a separate dev server instance pointed at test.db, or use far-future dates (e.g. 2099-01-01) that won't collide with real data.
