derived_from:
- BL-002
enforcement: manual
id: CON-010
product: PRD-001
rationale: CON-005 (invalidateAll pattern) prevented Svelte transitions and caused full-page reloads. The optimistic pattern gives instant UI feedback, enables animations, and uses Svelte 5 runes ($state, $derived, $effect) as intended. Proven in SPR-004 across tasks, categories, and ratings.
rule: Use server load functions for initial page data. For mutations, update local $state optimistically then sync to the server in background via fetch. Roll back local state on sync failure. Do not use invalidateAll() for mutation responses. Use $effect to re-sync local state from server data when page params change (e.g. date navigation).
scope: ui
status: active
tags:
- svelte
- data-flow
- optimistic-updates
type: convention
