category: tooling
created_at: "2026-03-19T22:55:07Z"
date: "2026-03-19"
id: FRC-005
led_to:
- CON-006
narrative: The agent deleted user tasks by running curl cleanup scripts against the dev server (which uses local.db), and then lost additional data by moving local.db aside during the auto-migration test (TSK-026). Both incidents resulted in unrecoverable data loss. This was the most significant friction in SPR-002.
resolution: Created CON-006 and TSK-032 (test data isolation). Added .env.test with DATABASE_URL=test.db and configured vitest to use it.
severity: medium
so_what: CON-006 was created to prevent this. Unit tests already use in-memory DBs. Future manual testing must use test.db or far-future dates. The agent must never run DELETE or file-move operations against local.db.
sprint: SPR-002
summary: Agent caused data loss twice by running destructive operations against live DB during testing
tags:
- data-loss
- testing
