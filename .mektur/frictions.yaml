id: FRC-008
narrative: "TSK-042 went through three iterations: (1) CSS keyframe animations that didn't fire due to invalidateAll (SPR-003), (2) custom Svelte transition functions attempting physics-like drop and shatter effects that looked wrong, (3) clean professional transitions (slide, fly, fade) that worked well. The user wanted tasks to 'fall from the add box' and 'break apart on delete' — effects that aren't achievable with CSS transforms alone."
severity: low
so_what: Set realistic expectations for CSS-based animations upfront. Slides, fades, and scales look professional. Physics and particle effects need canvas/GSAP. Don't promise flashy effects then iterate to simple ones — start with what CSS does well.
sprint: SPR-004
summary: Flashy animation expectations vs CSS capabilities — two failed iterations before settling on professional style
tags:
- animations
- ux
- expectations
type: friction
