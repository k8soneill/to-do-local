date: "2026-03-19"
id: FRC-004
impact_hours: 0.5
narrative: During API endpoint development and testing (TSK-014 through TSK-020), the agent used curl scripts to create test data, verify features, then clean up by deleting all tasks for the given date. These cleanup scripts ran against the live local.db database via the dev server. When testing on today's date, the cleanup deleted the user's real tasks along with the test data. The user lost all tasks for 2026-03-19.
resolution: Data was not recoverable. Need to add safeguards to prevent this in future.
severity: high
so_what: Test scripts must never run against the production/live database. Either use a dedicated test database, run tests against an in-memory DB (as the unit tests already do), or use a unique date/prefix for test data that won't collide with real data. The agent should never delete data from the live DB as part of testing.
sprint: SPR-002
summary: Test cleanup scripts deleted user data — tests ran against live database
tags:
- data-loss
- testing
- dev-workflow
type: friction
