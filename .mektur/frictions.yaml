id: FRC-003
narrative: DEC-001 (SvelteKit + SQLite) was recorded but no enforceable coding conventions were proposed alongside it. The project was empty at mektur init time so conventions couldn't be bootstrapped from code. The agent proceeded through all implementation tasks without any formal rules about SvelteKit patterns, Drizzle usage, or API design.
severity: low
so_what: Architecture decisions should immediately trigger propose_convention calls for the chosen stack. Without this, the agent has no enforceable guardrails during implementation.
sprint: SPR-001
summary: No coding conventions created when architecture decision was made
