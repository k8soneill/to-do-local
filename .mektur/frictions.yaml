id: FRC-007
narrative: The first pass at TSK-034 used an indigo primary and zinc surfaces. The user reported 'the UI doesn't look any different' because the colours were very close to Tailwind's defaults. Required a second iteration to switch to teal with slate surfaces and a tinted body background (surface-100 instead of surface-50) to create visible contrast.
severity: low
so_what: When creating a design system, start with colours that are obviously different from the framework defaults. Use a tinted body background rather than near-white to make cards pop. Get user feedback early before applying the palette across all pages.
sprint: SPR-003
summary: Initial design system colours were too similar to defaults — user couldn't see a difference
