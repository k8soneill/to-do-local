id: FRC-002
narrative: The sv create scaffolding chose better-sqlite3 as the SQLite client, but Bun doesn't support this native module. Both db:push and db:migrate via drizzle-kit failed. Required switching runtime to bun:sqlite, keeping better-sqlite3 as dev-only for drizzle-kit generate, and writing a custom migrate script.
resolution: "Split approach: bun:sqlite for runtime, better-sqlite3 as devDependency for drizzle-kit generate, custom migrate.ts script."
severity: medium
so_what: When choosing a runtime (Bun) and ORM (Drizzle), verify native module compatibility upfront. The scaffolding tool's defaults may not match the runtime.
sprint: SPR-001
summary: better-sqlite3 not supported in Bun — discovered mid-task
tags:
- bun
- drizzle
- sqlite
type: friction
