date: "2026-03-19"
id: FRC-001
narrative: During sprint planning, the agent created task YAML files directly in the filesystem instead of using `mektur add task --stdin`. This caused tasks to be invisible to the CLI, used wrong field names (name vs summary, feature vs epic), and missed the Feature → Epic → Task hierarchy entirely. Required deleting all manual files, creating 7 epics, and re-creating all 10 tasks via the CLI.
resolution: Deleted manual files, discovered correct schema via CLI errors, created epics then tasks using mektur add --stdin.
severity: medium
so_what: CLAUDE.md must explicitly instruct agents to use `mektur add <type> --stdin` for record creation and never write YAML manually. The CLI handles validation, ID assignment, counter updates, and correct file placement.
sprint: SPR-001
summary: Agent manually created YAML task files instead of using mektur CLI
tags:
- mektur
- workflow
- cli
type: friction
