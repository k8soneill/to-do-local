id: FRC-006
narrative: The eslint rule svelte/no-navigation-without-resolve flagged every href and goto() call, even for static routes like / and /history where resolveRoute adds no value. Using resolveRoute on these routes didn't satisfy the rule either. Had to disable the rule globally.
severity: low
so_what: When adopting eslint-plugin-svelte recommended config, review which rules are appropriate for the project. Some rules are designed for apps with parameterized routes and add noise to simpler apps.
sprint: SPR-002
summary: svelte/no-navigation-without-resolve lint rule false positives on static routes
