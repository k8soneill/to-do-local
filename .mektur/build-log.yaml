detail: The sv create scaffolding chose better-sqlite3 as the SQLite client, but Bun doesn't support this native module. Both `db:push` and `db:migrate` (via drizzle-kit) failed with 'better-sqlite3 is not yet supported in Bun'. drizzle-kit internally uses better-sqlite3 for its push command regardless of what driver the app uses.
id: BL-001
related_files:
- src/lib/server/db/index.ts
- src/lib/server/db/migrate.ts
- drizzle.config.ts
resolution: "Split the approach: use drizzle-orm/bun-sqlite with bun:sqlite for runtime (src/lib/server/db/index.ts), keep better-sqlite3 as a devDependency for drizzle-kit generate, and use a standalone migrate script (src/lib/server/db/migrate.ts) that uses bun:sqlite directly instead of drizzle-kit migrate. The db:generate command works fine since it only reads schema files. The db:push command still won't work under Bun."
so_what: "When using Bun + Drizzle + SQLite: always use bun:sqlite for runtime, use drizzle-kit generate (not push) for migrations, and write a custom migrate script. The db:push workflow is not available under Bun."
sprint: SPR-001
summary: better-sqlite3 is not supported in Bun — use bun:sqlite at runtime and keep better-sqlite3 as dev-only for drizzle-kit
tags:
- bun
- drizzle
