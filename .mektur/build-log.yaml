detail: Attempted custom Svelte transition functions for a gravity-drop-with-bounce (addTask) and shatter/crumble (deleteTask). The drop didn't look like falling from the add box because CSS transitions animate at the element's final position, not from another element. The shatter was just a weird rotate/skew that didn't look like breaking apart. True physics and particle effects need canvas/GSAP, not CSS.
id: BL-003
related_files:
- src/routes/+page.svelte
resolution: "Switched to clean professional transitions: slide open for add, fly-right for delete, flip for reorder, scale for checkbox. Fast (200-250ms) and snappy."
so_what: "Don't try to fake physics or particle effects with CSS transforms. Stick to what CSS does well: slides, fades, scales. Keep animations fast and purposeful — they should feel polished, not flashy."
sprint: SPR-004
summary: Flashy CSS animations (physics drops, shatter effects) don't work well — use clean transitions instead
