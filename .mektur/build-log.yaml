detail: Attempted to add entry/exit animations on task list items using both CSS animations and Svelte transition directives (fly, fade, scale, flip). Neither approach produced visible results because invalidateAll() re-fetches all data from the server load function and replaces the entire list in the DOM. Svelte sees a completely new list each time, not individual items being added or removed, so transitions never fire.
id: BL-002
related_files:
- src/routes/+page.svelte
- src/routes/layout.css
resolution: Reverted all animation code. To support list animations, the app would need to switch from invalidateAll() to optimistic updates — mutating a local reactive array directly and syncing with the server in background. This is a significant architectural change that conflicts with CON-005 (use server load + invalidateAll).
so_what: "The server load + invalidateAll() pattern (CON-005) is incompatible with entry/exit list animations. If animations are a priority in future, the data flow needs to change to client-side state with optimistic updates. This is a trade-off: simpler data flow vs visual polish."
sprint: SPR-003
summary: Svelte transitions don't work with invalidateAll() data flow — requires optimistic updates
